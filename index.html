<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crest Reserve</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background: radial-gradient(circle at top,#0b1c2c,#02070d);
  color:#fff;
}

/* HEADER */
.header {
  text-align:center;
  padding:25px;
}
.logo { width:80px; }
.title {
  font-size:32px;
  font-weight:700;
  letter-spacing:2px;
  background:linear-gradient(90deg,gold,#f5d06f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.tagline { font-size:13px; color:#ccc; }

/* PORTFOLIO */
#portfolio-summary {
  margin:15px;
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
}
.summary-card {
  display:flex;
  flex-wrap:wrap;
}
.summary-item {
  flex:1;
  margin:4px;
  padding:10px;
  border-radius:10px;
  text-align:center;
  min-width:100px;
}
.invested { background:rgba(59,130,246,0.2); }
.value { background:rgba(16,185,129,0.2); }
.gain { background:rgba(34,197,94,0.25); }
.eff { background:rgba(168,85,247,0.25); }

/* BONDS */
.container { max-width:500px; margin:auto; padding:10px; }

.bond {
  background:rgba(255,255,255,0.06);
  border-radius:15px;
  padding:15px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
}
.bond:hover { transform:translateY(-2px); }

.headerRow {
  font-weight:600;
  font-size:16px;
  margin-bottom:6px;
}

.details { max-height:0; overflow:hidden; transition:0.4s; }
.bond.active .details { max-height:750px; }

.row {
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:14px;
}

.label { color:#bbb; }
.big { color:#4fd1c5; font-weight:bold; }

.rate { font-size:12px; color:#9ae6b4; }
.today { font-size:12px; color:#90cdf4; }

.maturity-box {
  margin-top:10px;
  padding:8px;
  border-radius:8px;
  background:rgba(255,215,0,0.1);
  color:#ffd166;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div class="title">Crest Reserve</div>
  <div class="tagline">Secure Wealth. Elevated Returns.</div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio-summary">
  <div style="text-align:center;font-weight:bold;">Portfolio Summary</div>
  <div class="summary-card">
    <div class="summary-item invested" id="sum-invested"></div>
    <div class="summary-item value" id="sum-value"></div>
    <div class="summary-item gain" id="sum-gain"></div>
    <div class="summary-item eff" id="sum-eff"></div>
  </div>
</div>

<div class="container" id="bondContainer"></div>

<script>
function toggle(el){ el.classList.toggle("active"); }

function formatDate(d){
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
}

function formatINR(num){
  return num.toLocaleString("en-IN",{maximumFractionDigits:2});
}

function calcInterest(p,r,start){
  return (p*r*(Date.now()-start)/(100*365*24*3600*1000));
}

function perHour(p,r){ return (p*r)/(100*365*24); }
function perDay(p,r){ return (p*r)/(100*365); }

function startOfToday(){
  const n=new Date();
  return new Date(n.getFullYear(),n.getMonth(),n.getDate());
}

/* FETCH DATA */
fetch("bonds.json?v=" + Date.now())
.then(res=>res.json())
.then(data=>{

  const container=document.getElementById("bondContainer");
  const bonds=[];

  data.forEach(b=>{
    const start=new Date(b.investmentDate);
    const mat=new Date(start);
    mat.setMonth(mat.getMonth()+b.tenureMonths);

    const div=document.createElement("div");
    div.className="bond";

    div.innerHTML=`
      <div class="headerRow">Bond #${b.id}</div>

      <div class="row">
        <div class="label">Principal</div>
        <div class="big">₹ ${formatINR(b.principal)}</div>
      </div>

      <div class="details">
        <div class="row"><div class="label">Coupon</div><div>${b.coupon}% p.a</div></div>
        <div class="row"><div class="label">Start</div><div>${formatDate(start)}</div></div>
        <div class="row"><div class="label">Maturity</div><div>${formatDate(mat)}</div></div>
        <div class="row"><div class="label">Liquidity</div><div>${b.liquidity}</div></div>

        <div class="row">
          <div class="label">Interest</div>
          <div>
            <div class="big" id="i${b.id}"></div>
            <div class="rate" id="rate${b.id}"></div>
            <div class="today" id="today${b.id}"></div>
          </div>
        </div>

        <div class="row">
          <div class="label">Value</div>
          <div class="big" id="t${b.id}"></div>
        </div>

        <div class="row">
          <div class="label">Projected @ Maturity</div>
          <div class="big" id="pm${b.id}"></div>
        </div>

        <div class="maturity-box" id="m${b.id}"></div>
      </div>
    `;

    div.onclick=()=>toggle(div);
    container.appendChild(div);

    bonds.push({p:b.principal,r:b.coupon,start,mat,id:b.id});
  });

  function animate(){
    const today=startOfToday();

    let totalP=0,totalV=0;

    bonds.forEach(b=>{
      const i=calcInterest(b.p,b.r,b.start);
      const t=b.p+i;

      totalP+=b.p;
      totalV+=t;

      const tenureYears=(b.mat-b.start)/(1000*60*60*24*365);
      const projected=b.p+(b.p*b.r*tenureYears/100);

      const rateHr=perHour(b.p,b.r);
      const rateDay=perDay(b.p,b.r);

      const rateText = rateHr>0.1
        ? `+₹ ${rateHr.toFixed(3)} / hr`
        : `+₹ ${rateDay.toFixed(2)} / day`;

      const todayEarn=calcInterest(b.p,b.r,today);
      const daysLeft=Math.max(0,Math.floor((b.mat-Date.now())/(1000*60*60*24)));

      document.getElementById(`i${b.id}`).innerText=`₹ ${i.toFixed(2)}`;
      document.getElementById(`t${b.id}`).innerText=`₹ ${t.toFixed(2)}`;
      document.getElementById(`rate${b.id}`).innerText=rateText;
      document.getElementById(`today${b.id}`).innerText=`Today: ₹ ${todayEarn.toFixed(2)}`;
      document.getElementById(`m${b.id}`).innerText=`Matures in: ${daysLeft} days`;
      document.getElementById(`pm${b.id}`).innerText=`₹ ${formatINR(projected)}`;
    });

    const gain=totalV-totalP;

    // Portfolio Effective Return
    const firstStart=bonds[0].start;
    const daysPassed=(Date.now()-firstStart)/(1000*60*60*24);

    const portfolioEff = daysPassed>0
      ? (gain/totalP)*(365/daysPassed)*100
      : 0;

    document.getElementById("sum-invested").innerText=
      `Invested\n₹ ${formatINR(totalP)}`;

    document.getElementById("sum-value").innerText=
      `Current Value\n₹ ${formatINR(totalV)}`;

    document.getElementById("sum-gain").innerText=
      `Gains\n+₹ ${formatINR(gain)}`;

    document.getElementById("sum-eff").innerText=
      `Return (p.a)\n${portfolioEff.toFixed(2)}%`;

    requestAnimationFrame(animate);
  }

  animate();
});
</script>

</body>
</html>
